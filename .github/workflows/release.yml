name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs, not floating tags, so
      # an upstream retag or compromise cannot silently change what runs in
      # this privileged (`contents: write`) release pipeline. Resolve newer
      # SHAs from the upstream repos when bumping; the trailing comment
      # records the version the SHA pointed at when pinned.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Verify tag is reachable from main
        # The release workflow triggers on any v* tag push. Refuse to
        # publish if the tag commit is not an ancestor of origin/main, so
        # an accidentally pushed tag from a feature branch can't ship
        # unreviewed binaries.
        run: |
          set -euo pipefail
          git fetch origin main --depth=0 || git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from origin/main; refusing to release" >&2
            exit 1
          fi
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Verify go.sum matches downloaded modules
        # Read-only equivalent of `go mod tidy` for release: confirms the
        # committed go.sum is consistent without mutating the tagged tree.
        run: go mod verify
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
