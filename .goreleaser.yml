version: 2
project_name: freeagent

# No `before:` hook: release builds consume committed dep state instead
# of mutating it. CI runs `go mod verify` as the read-only equivalent.

builds:
  - id: freeagent
    binary: freeagent
    main: ./cmd/freeagent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: freeagent-ro
    binary: freeagent-ro
    main: ./cmd/freeagent
    flags:
      - -tags=readonly
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: freeagent
    ids:
      - freeagent
    name_template: "freeagent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

  - id: freeagent-ro
    ids:
      - freeagent-ro
    name_template: "freeagent-ro_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "^go mod tidy"

release:
  github:
    owner: boffinate
    name: freeagent-cli
  draft: false
  prerelease: auto
  # GitHub's upload API occasionally returns 5xx after the asset has already
  # been written. The retry then 422s with "already_exists". Replacing on
  # retry makes the upload idempotent across that flake.
  replace_existing_artifacts: true
  header: |
    ## Install

    Two binaries ship from one source tree:

    | Binary | For | Capabilities |
    |---|---|---|
    | `freeagent` | Humans at a terminal | Full read + write |
    | `freeagent-ro` | AI agents, scripts, automations | Read-only against FreeAgent business data |

    See [README — Safety model](https://github.com/boffinate/freeagent-cli#safety-model) for why two binaries rather than a `--write` flag.

    **Download** the archive for your OS/arch below, extract, and put the binary on your `PATH`. Verify against `checksums.txt`:

    ```bash
    shasum -a 256 -c checksums.txt --ignore-missing
    ```

    Or via `go install`:

    ```bash
    go install github.com/boffinate/freeagent-cli/cmd/freeagent@v{{ .Version }}
    ```
  footer: |
    **Full diff**: https://github.com/boffinate/freeagent-cli/compare/{{ .PreviousTag }}...{{ .Tag }}
