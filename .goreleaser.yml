version: 2
project_name: freeagent

# No `before:` hook: release builds consume committed dep state instead
# of mutating it. CI runs `go mod verify` as the read-only equivalent.

builds:
  - id: freeagent
    binary: freeagent
    main: ./cmd/freeagent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: freeagent-ro
    binary: freeagent-ro
    main: ./cmd/freeagent
    flags:
      - -tags=readonly
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: freeagent
    ids:
      - freeagent
    name_template: "freeagent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

  - id: freeagent-ro
    ids:
      - freeagent-ro
    name_template: "freeagent-ro_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: boffinate
    name: freeagent-cli
  draft: false
  prerelease: auto
  # GitHub's upload API occasionally returns 5xx after the asset has already
  # been written. The retry then 422s with "already_exists". Replacing on
  # retry makes the upload idempotent across that flake.
  replace_existing_artifacts: true
